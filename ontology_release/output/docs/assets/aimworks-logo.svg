<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160" role="img" aria-labelledby="title desc">
  <title id="title">AIMWORKS</title>
  <desc id="desc">AIMWORKS wordmark with network motif</desc>
  <defs>
    <linearGradient id="aimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8defff"/>
      <stop offset="100%" stop-color="#2ab3df"/>
    </linearGradient>
    <style>
      .node { fill: url(#aimGrad); stroke: #0d7ea3; stroke-width: 1.6; }
      .edge { stroke: #4fc7e9; stroke-width: 2; stroke-linecap: round; opacity: 0.85; }
      .word { font-family: "Segoe UI", "Arial", sans-serif; font-size: 46px; font-weight: 700; letter-spacing: 4px; fill: #f3fbff; }
    </style>
  </defs>

  <g transform="translate(44,16)">
    <line class="edge" x1="120" y1="8" x2="42" y2="36"/>
    <line class="edge" x1="120" y1="8" x2="198" y2="36"/>
    <line class="edge" x1="42" y1="36" x2="20" y2="88"/>
    <line class="edge" x1="42" y1="36" x2="84" y2="68"/>
    <line class="edge" x1="198" y1="36" x2="220" y2="88"/>
    <line class="edge" x1="198" y1="36" x2="156" y2="68"/>
    <line class="edge" x1="84" y1="68" x2="120" y2="110"/>
    <line class="edge" x1="156" y1="68" x2="120" y2="110"/>
    <line class="edge" x1="20" y1="88" x2="120" y2="110"/>
    <line class="edge" x1="220" y1="88" x2="120" y2="110"/>
    <line class="edge" x1="84" y1="68" x2="156" y2="68"/>

    <circle class="node" cx="120" cy="8" r="8"/>
    <circle class="node" cx="42" cy="36" r="7"/>
    <circle class="node" cx="198" cy="36" r="7"/>
    <circle class="node" cx="20" cy="88" r="7"/>
    <circle class="node" cx="84" cy="68" r="8"/>
    <circle class="node" cx="156" cy="68" r="8"/>
    <circle class="node" cx="220" cy="88" r="7"/>
    <circle class="node" cx="120" cy="110" r="9"/>
    <circle class="node" cx="120" cy="60" r="9"/>
  </g>

  <text class="word" x="238" y="96" text-anchor="middle">AIMWORKS</text>
</svg>
