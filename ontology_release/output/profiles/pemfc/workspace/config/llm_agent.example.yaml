enabled: false
provider: openai_compatible
api_base: https://api.openai.com/v1
api_key_env: OPENAI_API_KEY
model: gpt-4.1-mini
temperature: 0.2
max_tokens: 700
request_timeout_seconds: 60
cache_directory: cache/llm
system_prompt: |
  You draft concise ontology labels, comments, and definitions for a PEMFC
  catalyst-layer application ontology. Preserve local domain meaning, prefer
  conservative wording, and do not introduce new commitments not supported by
  the ontology context.
