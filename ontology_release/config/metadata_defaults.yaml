ontology:
  title: H2KG Application Ontology for Hydrogen Electrochemical Systems
  subtitle: EMMO-aligned ontology for hydrogen electrochemical systems, experiments, materials, and FAIR provenance
  abstract: >
    Application ontology for representing hydrogen electrochemical systems,
    experiments, materials, manufacturing conditions, measurements, quantities,
    datasets, and release metadata with conservative alignment to EMMO, ECHO,
    QUDT, ChEBI, PROV-O, and Dublin Core Terms.
  description: >
    The ontology captures hydrogen electrochemical concepts spanning PEMFC and
    PEMWE profiles, including parameters, properties, measurements,
    instruments, materials, data, and related FAIR provenance. It preserves
    the historic h2kg namespace while improving metadata quality, release
    readiness, and public documentation.
  created: 2026-03-19
  modified: 2026-03-19
  language: en
  creators: [AIMWORKS Maintainers]
  contributors: [Electrochemistry Research Group]
  source: [ONTOLOGY_extended.jsonld]
