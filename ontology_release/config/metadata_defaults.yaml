ontology:
  title: H2KG PEMFC Catalyst Layer Application Ontology
  subtitle: EMMO-aligned ontology for low-Pt PEMFC catalyst-layer experiments and related provenance
  abstract: >
    Application ontology for representing low-Pt PEMFC cathode catalyst layer
    experiments, materials, manufacturing conditions, measurements, quantities,
    and release metadata with conservative alignment to EMMO, ECHO, QUDT,
    ChEBI, PROV-O, and Dublin Core Terms.
  description: >
    The ontology captures PEMFC catalyst-layer experimental concepts,
    parameters, properties, measurements, instruments, materials, and related
    FAIR provenance. It preserves the historic h2kg namespace while improving
    metadata quality, release readiness, and public documentation.
  created: 2026-03-19
  modified: 2026-03-19
  language: en
  creators: [AIMWORKS Maintainers]
  contributors: [Electrochemistry Research Group]
  source: [ONTOLOGY_extended.jsonld]
term_annotations:
  label_language: en
  comment_language: en
  definition_language: en
  add_is_defined_by: true
  add_preferred_namespace: true
  prefer_skos_definition: true
  infer_labels_from_local_names: true
  infer_comments_for_unannotated_schema_terms: true
  infer_definitions_for_unannotated_schema_terms: true
