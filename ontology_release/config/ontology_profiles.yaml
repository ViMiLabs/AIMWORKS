active_profile: pemfc
build_order:
  - pemfc
  - pemwe
site:
  title: H2KG - Ontology for Hydrogen Electrochemical Systems
  subtitle: Application ontology profiles for PEMFC and PEMWE technologies
  pages_base_path: /AIMWORKS
profiles:
  pemfc:
    label: PEMFC
    slug: pemfc
    input_path: ../input/ONTOLOGY_PEMFC.jsonld
    release_profile_overrides:
      documentation:
        resources:
          ontology_homepage_iri: https://w3id.org/h2kg/pemfc
      unit_enrichment:
        enabled: true
        curated_units_path: config/curated_units/pemfc_curated_units.csv
    namespace_overrides:
      ontology_iri: https://w3id.org/h2kg/pemfc
      public_html_base: https://w3id.org/h2kg/pemfc
      version_iri_template: https://w3id.org/h2kg/pemfc/releases/{version}
    profile_heading: PEMFC application profile
    project_overrides:
      subtitle: PEMFC application profile
      short_title: H2KG - PEMFC Profile
    documentation_overrides:
      site_tagline: FAIR, EMMO-aligned documentation for the PEMFC profile
      landing_intro: H2KG portal profile for low-Pt PEMFC cathode catalyst-layer experiments, measurements, materials, provenance, and curated domain vocabulary.
  pemwe:
    label: PEMWE
    slug: pemwe
    input_path: ../input/ONTOLOGY_PEMWE.jsonld
    release_profile_overrides:
      documentation:
        resources:
          ontology_homepage_iri: https://w3id.org/h2kg/pemwe
    namespace_overrides:
      ontology_iri: https://w3id.org/h2kg/pemwe
      public_html_base: https://w3id.org/h2kg/pemwe
      version_iri_template: https://w3id.org/h2kg/pemwe/releases/{version}
    profile_heading: PEMWE application profile
    project_overrides:
      subtitle: PEMWE application profile
      short_title: H2KG - PEMWE Profile
    documentation_overrides:
      site_tagline: FAIR, EMMO-aligned documentation for the PEMWE profile
      landing_intro: H2KG portal profile for PEM water electrolysis device, material, measurement, and provenance-aligned ontology publication.
