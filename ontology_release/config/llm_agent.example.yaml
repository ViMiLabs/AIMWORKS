provider:
  enabled: false
  name: openai-compatible
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  model: gpt-4.1-mini
  temperature: 0.1
  timeout_seconds: 45
drafting:
  max_terms_per_run: 25
  include_neighbor_context: true
  include_external_mapping_context: true
  include_example_context: true
  require_review_before_apply: true
cache:
  path: cache/llm_annotation_cache.json
review:
  csv_path: output/review/annotation_drafts.csv
  jsonl_path: output/review/annotation_drafts.jsonl
