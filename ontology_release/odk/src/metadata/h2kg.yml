# PURL configuration for http://purl.obolibrary.org/obo/h2kg

idspace: H2KG
base_url: /obo/h2kg

products:
- h2kg.owl: https://raw.githubusercontent.com/ViMiLabs/AIMWORKS/main/h2kg.owl
- h2kg.obo: https://raw.githubusercontent.com/ViMiLabs/AIMWORKS/main/h2kg.obo

term_browser: ontobee
example_terms:
- H2KG_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/ViMiLabs/AIMWORKS/v

- prefix: /tracker/
  replacement: https://github.com/ViMiLabs/AIMWORKS/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/H2KG?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/ViMiLabs/AIMWORKS/main/

