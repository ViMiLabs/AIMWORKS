<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | {{ project.title }}</title>
  <link rel="stylesheet" href="{{ base_path }}assets/style.css">
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">{{ project.short_title }}</p>
      <h1>{{ page_title }}</h1>
      <p class="subtitle">{{ page_subtitle or project.subtitle }}</p>
      <nav class="nav">
        <a href="{{ base_path }}index.html">Home</a>
        <a href="{{ base_path }}pages/user-guide.html">User Guide</a>
        <a href="{{ base_path }}pages/ontology-overview.html">Overview</a>
        <a href="{{ base_path }}pages/class-index.html">Classes</a>
        <a href="{{ base_path }}pages/property-index.html">Properties</a>
        <a href="{{ base_path }}pages/alignment.html">Alignments</a>
        <a href="{{ base_path }}pages/examples.html">Examples</a>
        <a href="{{ base_path }}pages/release.html">Release</a>
      </nav>
    </div>
  </header>
  <main class="wrap content">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <div class="wrap">
      <p>{{ project.title }} | Version {{ project.version }} | Namespace {{ project.namespace_uri }}</p>
    </div>
  </footer>
</body>
</html>
