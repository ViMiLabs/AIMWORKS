{% extends "base.html" %}
{% block content %}
<section class="search-box">
  <input id="termFilter" type="search" placeholder="Filter classes by label or IRI">
</section>
<section class="list-grid">
  {% for term in classes %}
  <article class="term-card" data-term="{{ (term.label ~ ' ' ~ term.iri)|lower }}">
    <h2>{{ term.label }}</h2>
    <p class="iri">{{ term.iri }}</p>
    <p>{{ term.description }}</p>
    {% if term.mappings %}
    <p><strong>Mappings:</strong> {{ term.mappings|join(', ') }}</p>
    {% endif %}
  </article>
  {% endfor %}
</section>
<script>
const filter = document.getElementById('termFilter');
const cards = Array.from(document.querySelectorAll('.term-card'));
filter.addEventListener('input', () => {
  const value = filter.value.toLowerCase();
  cards.forEach(card => {
    card.style.display = card.dataset.term.includes(value) ? 'block' : 'none';
  });
});
</script>
{% endblock %}
