name: Ontology Release

on:
  workflow_dispatch:
  push:
    paths:
      - "ontology_release/**"
      - "input/**"
      - ".github/workflows/ontology-release.yml"

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ontology_release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run tests
        run: python -m pytest
      - name: Build ontology release
        run: python -m aimworks_ontology_release.cli release-all
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ontology-release-bundle
          path: ontology_release/output/release_bundle
      - name: Upload publication site
        uses: actions/upload-artifact@v4
        with:
          name: ontology-publication-site
          path: ontology_release/output/publication
