name: Ontology Release

on:
  workflow_dispatch:
  push:
    paths:
      - "ontology_release/**"
      - ".github/workflows/ontology-release.yml"

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ontology_release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Install ontology_release package
        run: python -m pip install --no-build-isolation -e .
      - name: Prepare ODK seed inputs
        run: python -m aimworks_ontology_release.cli --project-root . odk --input input/current_ontology.jsonld --prepare-only
      - name: Refresh ODK repository scaffolding
        run: bash odk/src/ontology/run.sh update_repo
      - name: Reapply AIMWORKS ODK customizations
        run: python -m aimworks_ontology_release.cli --project-root . odk --input input/current_ontology.jsonld --prepare-only
      - name: Run ODK version check
        run: bash odk/src/ontology/run.sh make odkversion
      - name: Refresh ODK imports
        run: bash odk/src/ontology/run.sh make refresh-imports
      - name: Run ODK tests
        run: bash odk/src/ontology/run.sh make test
      - name: Build ODK release artefacts
        run: bash odk/src/ontology/run.sh make prepare_release
      - name: Collect actual ODK outputs
        run: python -m aimworks_ontology_release.cli --project-root . odk --input input/current_ontology.jsonld --collect-only
      - name: Run tests
        run: python -m pytest
      - name: Build ontology release bundle
        run: python -m aimworks_ontology_release.cli --project-root . run --input input/current_ontology.jsonld --rewrite --split --build-docs --build-release --fair-check
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ontology-release-bundle
          path: ontology_release/output/release_bundle
