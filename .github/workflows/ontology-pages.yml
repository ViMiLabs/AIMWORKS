name: Ontology Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ontology_release/**"
      - ".github/workflows/ontology-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ontology_release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install --no-build-isolation -e .
      - run: python -m aimworks_ontology_release.cli --project-root . run --input input/current_ontology.jsonld --rewrite --split --build-docs --build-release --fair-check
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ontology_release/output/docs
      - uses: actions/deploy-pages@v4
